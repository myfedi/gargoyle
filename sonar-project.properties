sonar.projectKey=myfedi_gargoyle
sonar.organization=myfedi

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=gargoyle
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\\" by "/" on Windows.
sonar.sources=.
sonar.exclusions=**/*_test.go,dev.db*,gargoyle.db,media/**,frontend/node_modules/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage.out

# integration/docker/gargoyle.Dockerfile intentionally uses COPY . . for the
# integration image; the root .dockerignore excludes local secrets and runtime data.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S6470
sonar.issue.ignore.multicriteria.e1.resourceKey=integration/docker/gargoyle.Dockerfile

# This project uses SQLite migrations. Do not let SonarCloud treat generic .sql
# migration files as Oracle PL/SQL, which produces Oracle-specific false positives.
sonar.plsql.file.suffixes=.pks,.pkb

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
