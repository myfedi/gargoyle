name: Security PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        uses: securego/gosec@f1c81de5fcdf7b466b229fb24ca02d1a8406dd09
        with:
          args: './...'
